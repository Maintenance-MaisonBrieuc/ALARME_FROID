<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surveillance Froid — Maison Brieuc</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3247;
    --text: #e8eaf0;
    --muted: #6b7280;
    --ok: #22c55e;
    --ok-bg: rgba(34,197,94,0.08);
    --warn: #f59e0b;
    --warn-bg: rgba(245,158,11,0.08);
    --alarm: #ef4444;
    --alarm-bg: rgba(239,68,68,0.10);
    --cold: #38bdf8;
    --accent: #6366f1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-left h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .header-left span {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ok);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .last-update {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  main {
    padding: 20px 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  .summary-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .summary-chip {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .summary-chip .val {
    font-size: 22px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    display: block;
  }

  .summary-chip .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
    display: block;
  }

  .summary-chip.alarm-chip { border-color: var(--alarm); background: var(--alarm-bg); }
  .summary-chip.alarm-chip .val { color: var(--alarm); }
  .summary-chip.ok-chip { border-color: var(--ok); background: var(--ok-bg); }
  .summary-chip.ok-chip .val { color: var(--ok); }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.3s, background 0.3s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 12px 0 0 12px;
    background: var(--border);
    transition: background 0.3s;
  }

  .card.ok::before { background: var(--ok); }
  .card.alarm::before { background: var(--alarm); }
  .card.alarm { border-color: var(--alarm); background: var(--alarm-bg); }
  .card.loading { opacity: 0.5; }

  .card-left {}

  .card-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .card-range {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .card-right {
    text-align: right;
  }

  .card-temp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--cold);
    line-height: 1;
  }

  .card.alarm .card-temp { color: var(--alarm); }

  .card-status {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
    font-weight: 600;
  }

  .card.ok .card-status { color: var(--ok); }
  .card.alarm .card-status { color: var(--alarm); }
  .card.loading .card-status { color: var(--muted); }

  .alarm-badge {
    display: inline-block;
    background: var(--alarm);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }

  .refresh-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 10px;
  }

  .refresh-btn:hover { background: var(--border); }
  .refresh-btn:active { transform: scale(0.98); }

  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 20px 16px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid var(--alarm);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--alarm);
    margin-bottom: 16px;
    text-align: center;
  }

  .plage-note {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1><span class="status-dot" id="statusDot"></span>Maison Brieuc</h1>
    <span>Surveillance chaîne du froid</span>
  </div>
  <div class="last-update" id="lastUpdate">—</div>
</header>

<main>
  <div id="errorMsg" class="error-msg" style="display:none;"></div>

  <div class="summary-bar">
    <div class="summary-chip alarm-chip">
      <span class="val" id="alarmCount">—</span>
      <span class="lbl">Alarmes</span>
    </div>
    <div class="summary-chip ok-chip">
      <span class="val" id="okCount">—</span>
      <span class="lbl">OK</span>
    </div>
  </div>

  <div class="section-label">Froid permanent (24h/24)</div>
  <div class="cards" id="cardsPerma"></div>

  <div class="section-label">Salles de stockage (6h – 22h) <span class="plage-note">— alarmes actives en heures ouvrables</span></div>
  <div class="cards" id="cardsSalles"></div>

  <button class="refresh-btn" onclick="chargerDonnees()" id="refreshBtn">
    ↻ Actualiser
  </button>

  <div style="text-align:center; font-size:11px; color: var(--muted);">
    Mise à jour automatique toutes les 5 minutes
  </div>
</main>

<footer class="footer">
  Données via ThingSpeak · Maison Brieuc © 2026
</footer>

<script>
const CHANNEL_ID = "3421101";
const READ_KEY   = "X5Z45JL5U2ORSSOX";

const SONDES = [
  { id: "S1", field: "field1", nom: "Congélateur",   min: -30, max: -12, permanent: true },
  { id: "S2", field: "field2", nom: "Froid Positif", min: 1,   max: 6,  permanent: true },
  { id: "S3", field: "field3", nom: "Salle Bonbon",  min: 10.5,max: 24,  permanent: false },
  { id: "S4", field: "field4", nom: "Réf. Rapide",   min: 6,   max: 30,  permanent: false },
  { id: "S5", field: "field5", nom: "Emballage",     min: 7,   max: 23,  permanent: false },
  { id: "S6", field: "field6", nom: "Stockage",      min: 7,   max: 20,  permanent: false },
];

function formatHeure() {
  return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function buildCard(sonde, temp, isLoading, isAlarm) {
  const card = document.createElement('div');
  card.className = 'card ' + (isLoading ? 'loading' : (isAlarm ? 'alarm' : 'ok'));
  card.id = 'card-' + sonde.id;

  const tempStr = isLoading ? '…' : (temp !== null ? temp.toFixed(1) + '°C' : '—');
  const statusStr = isLoading ? 'Chargement…' : (isAlarm ? '⚠ HORS SEUIL' : 'Normal');
  const alarmBadge = isAlarm ? '<span class="alarm-badge">ALARME</span>' : '';

  card.innerHTML = `
    <div class="card-left">
      <div class="card-name">${sonde.nom}${alarmBadge}</div>
      <div class="card-range">Seuils : ${sonde.min}°C / ${sonde.max}°C</div>
    </div>
    <div class="card-right">
      <div class="card-temp">${tempStr}</div>
      <div class="card-status">${statusStr}</div>
    </div>
  `;
  return card;
}

function renderLoading() {
  const perma = document.getElementById('cardsPerma');
  const salles = document.getElementById('cardsSalles');
  perma.innerHTML = '';
  salles.innerHTML = '';

  SONDES.forEach(s => {
    const card = buildCard(s, null, true, false);
    if (s.permanent) perma.appendChild(card);
    else salles.appendChild(card);
  });
}

async function chargerDonnees() {
  const btn = document.getElementById('refreshBtn');
  btn.innerHTML = '<span class="spinner"></span>Actualisation…';
  btn.disabled = true;

  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  try {
    const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Erreur réseau : ' + res.status);
    const data = await res.json();

    let nbAlarmes = 0;
    let nbOk = 0;

    SONDES.forEach(s => {
      const temp = data[s.field] !== null && data[s.field] !== undefined ? parseFloat(data[s.field]) : null;
      const isAlarm = temp !== null && (temp < s.min || temp > s.max);

      if (isAlarm) nbAlarmes++;
      else if (temp !== null) nbOk++;

      const existing = document.getElementById('card-' + s.id);
      const newCard = buildCard(s, temp, false, isAlarm);

      if (existing) existing.replaceWith(newCard);
    });

    document.getElementById('alarmCount').textContent = nbAlarmes;
    document.getElementById('okCount').textContent = nbOk;
    document.getElementById('lastUpdate').textContent = formatHeure();
    document.getElementById('statusDot').style.background = nbAlarmes > 0 ? '#ef4444' : '#22c55e';

  } catch (e) {
    errEl.textContent = 'Impossible de contacter ThingSpeak. Vérifiez la connexion.';
    errEl.style.display = 'block';
    document.getElementById('statusDot').style.background = '#f59e0b';
  }

  btn.innerHTML = '↻ Actualiser';
  btn.disabled = false;
}

// Initialisation
renderLoading();
chargerDonnees();

// Rafraîchissement automatique toutes les 5 minutes
setInterval(chargerDonnees, 5 * 60 * 1000);
</script>
</body>
</html>
